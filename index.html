<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>网页小助手</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;color:#e0e0e0;font-family:'Segoe UI','Microsoft YaHei',sans-serif;min-height:100vh;padding:24px 32px;user-select:none;}

/* 右键菜单 */
.ctx-menu{display:none;position:fixed;background:#1a1a1a;border:1px solid #333;border-radius:10px;padding:6px 0;z-index:9999;min-width:120px;box-shadow:0 4px 20px rgba(0,0,0,.6);}
.ctx-menu .ctx-item{padding:8px 16px;font-size:13px;cursor:pointer;color:#ccc;}
.ctx-menu .ctx-item:hover{background:#282828;color:#fff;}
.ctx-menu .ctx-item.danger{color:#e91e63;}

/* 主布局：左 中 右 三栏 */
.dashboard{display:grid;grid-template-columns:1fr 1fr 560px;gap:20px;height:calc(100vh - 48px);}
.col-left,.col-mid{display:flex;flex-direction:column;gap:16px;overflow-y:auto;}
.right-panel{background:#050505;border:1px solid #111;border-radius:16px;padding:20px;overflow-y:auto;}

/* 功能卡片区 */
.module-card{background:#0d0d0d;border:1px solid #161616;border-radius:16px;padding:20px;position:relative;transition:box-shadow .2s;}
.module-card:hover{box-shadow:0 0 0 1px #222;}
.module-card h3{font-size:15px;color:#888;font-weight:500;margin-bottom:12px;}

/* 网址区 */
.links-grid{display:flex;flex-wrap:wrap;gap:16px;align-items:flex-start;align-content:flex-start;}
.link-item{display:flex;flex-direction:column;align-items:center;width:80px;cursor:pointer;text-decoration:none;color:#ccc;transition:transform .15s;position:relative;}
.link-item:hover{transform:scale(1.08);color:#fff;}
.link-icon{width:54px;height:54px;border-radius:14px;background:#1a1a1a;border:1px solid #282828;display:flex;align-items:center;justify-content:center;font-size:24px;margin-bottom:6px;}
.link-item span{font-size:12px;text-align:center;line-height:1.3;max-width:76px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
</style>
</head>
<body>

<!-- 右键菜单 -->
<div class="ctx-menu" id="ctxMenu"></div>

<!-- 添加模块弹窗 -->
<div id="addModuleOverlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:2000;"></div>
<div id="addModuleModal" style="display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#111;border:1px solid #333;border-radius:16px;padding:24px;z-index:2001;width:280px;">
  <h3 style="color:#ddd;font-size:15px;margin-bottom:16px;">添加模块</h3>
  <div style="display:flex;flex-direction:column;gap:10px;">
    <button data-add-module="calendar" style="background:#1a1a1a;border:1px solid #333;color:#ccc;padding:12px;border-radius:10px;cursor:pointer;font-size:14px;text-align:left;">🗓️ 日历</button>
    <button data-add-module="countdown" style="background:#1a1a1a;border:1px solid #333;color:#ccc;padding:12px;border-radius:10px;cursor:pointer;font-size:14px;text-align:left;">📅 倒计时</button>
    <button data-add-module="workoff" style="background:#1a1a1a;border:1px solid #333;color:#ccc;padding:12px;border-radius:10px;cursor:pointer;font-size:14px;text-align:left;">⏰ 下班倒计时</button>
  </div>
</div>

<!-- 编辑网址弹窗 -->
<div id="linkModalOverlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:2000;"></div>
<div id="linkModal" style="display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#111;border:1px solid #333;border-radius:16px;padding:24px;z-index:2001;width:320px;">
  <h3 id="linkModalTitle" style="color:#ddd;font-size:15px;margin-bottom:14px;">添加网址</h3>
  <input id="linkName" type="text" placeholder="名称" maxlength="10" style="display:block;width:100%;background:#1a1a1a;border:1px solid #333;color:#eee;padding:10px 12px;border-radius:8px;font-size:14px;margin-bottom:10px;">
  <input id="linkUrl" type="text" placeholder="网址（如：www.baidu.com）" style="display:block;width:100%;background:#1a1a1a;border:1px solid #333;color:#eee;padding:10px 12px;border-radius:8px;font-size:14px;margin-bottom:10px;">
  <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px;">
    <span style="font-size:13px;color:#888;">图标</span>
    <input id="linkIcon" type="text" placeholder="emoji" maxlength="4" style="width:52px;text-align:center;font-size:18px;padding:8px 4px;background:#1a1a1a;border:1px solid #333;color:#eee;border-radius:8px;cursor:pointer;" readonly>
    <label style="background:#333;color:#ccc;padding:8px 14px;border-radius:8px;cursor:pointer;font-size:13px;white-space:nowrap;">本地图片<input id="linkIconFile" type="file" accept="image/*" style="display:none;"></label>
    <span id="iconPreview" style="font-size:13px;color:#555;"></span>
  </div>
  <div id="emojiPicker" style="display:none;margin-bottom:14px;background:#1a1a1a;border:1px solid #333;border-radius:10px;padding:10px;max-height:200px;overflow-y:auto;">
    <div id="emojiGrid" style="display:flex;flex-wrap:wrap;gap:4px;"></div>
  </div>
  <div style="display:flex;gap:10px;justify-content:flex-end;">
    <button id="linkCancelBtn" style="background:#333;color:#ccc;border:none;padding:8px 18px;border-radius:8px;cursor:pointer;font-size:14px;">取消</button>
    <button id="linkSaveBtn" style="background:#4caf50;color:#fff;border:none;padding:8px 18px;border-radius:8px;cursor:pointer;font-size:14px;">保存</button>
  </div>
</div>

<!-- 事件管理弹窗 -->
<div id="evtModalOverlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:2000;"></div>
<div id="evtModal" style="display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#111;border:1px solid #333;border-radius:16px;padding:24px;z-index:2001;width:420px;max-height:80vh;overflow-y:auto;">
  <h3 style="color:#ddd;font-size:15px;margin-bottom:14px;">管理倒计时事件</h3>
  <div style="display:flex;gap:6px;align-items:center;margin-bottom:12px;flex-wrap:nowrap;">
    <input id="evtIcon" type="text" placeholder="😀" maxlength="4" style="width:40px;text-align:center;font-size:16px;cursor:pointer;background:#1a1a1a;border:1px solid #333;color:#eee;padding:6px;border-radius:8px;" readonly>
    <input id="evtName" type="text" placeholder="名称" style="width:70px;background:#1a1a1a;border:1px solid #333;color:#eee;padding:6px 10px;border-radius:8px;font-size:13px;">
    <select id="evtCycle" style="background:#1a1a1a;border:1px solid #333;color:#eee;padding:6px 4px;border-radius:8px;font-size:12px;width:68px;">
      <option value="monthly">按月</option><option value="yearly">按年</option><option value="yearly-lunar">农历</option>
    </select>
    <input id="evtMonth" type="number" min="1" max="12" placeholder="月" style="width:40px;background:#1a1a1a;border:1px solid #333;color:#eee;padding:6px 6px;border-radius:8px;font-size:13px;">
    <input id="evtDay" type="number" min="1" max="31" placeholder="日" style="width:40px;background:#1a1a1a;border:1px solid #333;color:#eee;padding:6px 6px;border-radius:8px;font-size:13px;">
    <input id="evtColor" type="color" value="#4caf50" style="width:32px;height:32px;padding:2px;border-radius:8px;cursor:pointer;border:1px solid #333;">
    <button id="evtAddBtn" style="background:#4caf50;color:#fff;border:none;padding:6px 12px;border-radius:8px;cursor:pointer;font-size:13px;height:32px;white-space:nowrap;">添加</button>
  </div>
  <div id="evtEmojiPicker" style="display:none;margin-bottom:10px;background:#1a1a1a;border:1px solid #333;border-radius:10px;padding:10px;max-height:160px;overflow-y:auto;">
    <div id="evtEmojiGrid" style="display:flex;flex-wrap:wrap;gap:4px;"></div>
  </div>
  <div id="evtList"></div>
  <div style="text-align:right;margin-top:12px;"><button id="evtCloseBtn" style="background:#333;color:#ccc;border:none;padding:8px 18px;border-radius:8px;cursor:pointer;font-size:14px;">关闭</button></div>
</div>

<!-- 下班倒计时设置弹窗 -->
<div id="workModalOverlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:2000;"></div>
<div id="workModal" style="display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#111;border:1px solid #333;border-radius:16px;padding:24px;z-index:2001;width:340px;">
  <h3 style="color:#ddd;font-size:15px;margin-bottom:14px;">⏰ 下班倒计时设置</h3>
  <div style="display:flex;gap:10px;margin-bottom:12px;align-items:center;">
    <span style="font-size:13px;color:#888;">上班</span>
    <input id="workStart" type="time" step="1" style="background:#1a1a1a;border:1px solid #333;color:#eee;padding:8px 12px;border-radius:8px;font-size:14px;flex:1;">
  </div>
  <div style="display:flex;gap:10px;margin-bottom:12px;align-items:center;">
    <span style="font-size:13px;color:#888;">下班</span>
    <input id="workEnd" type="time" step="1" style="background:#1a1a1a;border:1px solid #333;color:#eee;padding:8px 12px;border-radius:8px;font-size:14px;flex:1;">
  </div>
  <div style="display:flex;gap:10px;margin-bottom:14px;align-items:center;">
    <span style="font-size:13px;color:#888;">图片</span>
    <label style="background:#333;color:#ccc;padding:8px 14px;border-radius:8px;cursor:pointer;font-size:13px;">选择图片<input id="workImgFile" type="file" accept="image/*" style="display:none;"></label>
    <span id="workImgPreview" style="font-size:13px;color:#555;"></span>
  </div>
  <div style="display:flex;gap:10px;justify-content:flex-end;">
    <button id="workCancelBtn" style="background:#333;color:#ccc;border:none;padding:8px 18px;border-radius:8px;cursor:pointer;font-size:14px;">取消</button>
    <button id="workSaveBtn" style="background:#4caf50;color:#fff;border:none;padding:8px 18px;border-radius:8px;cursor:pointer;font-size:14px;">保存</button>
  </div>
</div>

<!-- 备忘录弹窗 -->
<div id="memoModalOverlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:2000;"></div>
<div id="memoModal" style="display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#111;border:1px solid #333;border-radius:16px;padding:24px;z-index:2001;width:400px;max-height:80vh;overflow-y:auto;">
  <h3 style="color:#ddd;font-size:15px;margin-bottom:14px;">📝 备忘录</h3>
  <div style="display:flex;gap:8px;margin-bottom:12px;align-items:center;">
    <input id="memoDate" type="date" style="background:#1a1a1a;border:1px solid #333;color:#eee;padding:6px 10px;border-radius:8px;font-size:13px;">
    <input id="memoText" type="text" placeholder="备忘内容" style="flex:1;background:#1a1a1a;border:1px solid #333;color:#eee;padding:6px 10px;border-radius:8px;font-size:13px;">
    <button id="memoAddBtn" style="background:#5c6bc0;color:#fff;border:none;padding:6px 14px;border-radius:8px;cursor:pointer;font-size:13px;height:32px;white-space:nowrap;">添加</button>
  </div>
  <div id="memoList"></div>
  <div style="text-align:right;margin-top:12px;"><button id="memoCloseBtn" style="background:#333;color:#ccc;border:none;padding:8px 18px;border-radius:8px;cursor:pointer;font-size:14px;">关闭</button></div>
</div>

<!-- 设置弹窗 -->
<div id="settingsOverlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:2000;"></div>
<div id="settingsModal" style="display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#111;border:1px solid #333;border-radius:16px;padding:24px;z-index:2001;width:380px;max-height:80vh;overflow-y:auto;">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
    <h3 style="color:#ddd;font-size:15px;margin:0;">⚙️ 设置</h3>
    <button id="settingsCloseBtn" style="background:none;border:none;color:#666;font-size:20px;cursor:pointer;padding:0 4px;">✕</button>
  </div>
  <div style="margin-bottom:16px;">
    <button id="settingsAddLinkBtn" style="background:#1a1a1a;border:1px solid #333;color:#ccc;padding:10px 16px;border-radius:8px;cursor:pointer;font-size:13px;width:100%;text-align:left;">🔗 添加网址</button>
  </div>
  <div style="margin-bottom:16px;">
    <h4 style="font-size:13px;color:#888;margin-bottom:10px;">🔤 字体</h4>
    <select id="fontSelect" style="background:#1a1a1a;border:1px solid #333;color:#eee;padding:8px 12px;border-radius:8px;font-size:13px;width:100%;">
      <option value="'Microsoft YaHei',sans-serif">微软雅黑</option>
      <option value="'SimHei',sans-serif">黑体</option>
      <option value="'SimSun',serif">宋体</option>
      <option value="'KaiTi',serif">楷体</option>
      <option value="'FangSong',serif">仿宋</option>
      <option value="'DengXian',sans-serif">等线</option>
      <option value="'YouYuan',sans-serif">幼圆</option>
      <option value="'LiSu',sans-serif">隶书</option>
      <option value="'STXingkai',serif">华文行楷</option>
      <option value="'STCaiyun',sans-serif">华文彩云</option>
      <option value="'Segoe UI',sans-serif">Segoe UI</option>
      <option value="'Consolas',monospace">Consolas</option>
    </select>
  </div>
  <div>
    <h4 style="font-size:13px;color:#888;margin-bottom:10px;">💾 数据</h4>
    <div style="display:flex;gap:10px;">
      <button id="exportBtn" style="background:#5c6bc0;color:#fff;border:none;padding:8px 16px;border-radius:8px;cursor:pointer;font-size:13px;flex:1;">导出配置</button>
      <label style="background:#26a69a;color:#fff;padding:8px 16px;border-radius:8px;cursor:pointer;font-size:13px;flex:1;text-align:center;">导入配置<input id="importFile" type="file" accept=".json" style="display:none;"></label>
    </div>
  </div>
</div>

<!-- 悬浮提示 -->
<div id="dayTooltip" style="display:none;position:fixed;background:#222;color:#ddd;padding:8px 14px;border-radius:10px;font-size:13px;z-index:999;pointer-events:none;border:1px solid #333;white-space:nowrap;"></div>

<!-- 右下角设置按钮 -->
<button id="settingsFloatBtn" style="position:fixed;bottom:24px;right:24px;width:48px;height:48px;border-radius:50%;background:#1a1a1a;border:1px solid #333;font-size:22px;cursor:pointer;z-index:1000;display:flex;align-items:center;justify-content:center;">⚙️</button>

<!-- 主内容 -->
<div class="dashboard">
  <div class="col-left" id="colLeft"></div>
  <div class="col-mid" id="colMid"></div>
  <div class="right-panel">
    <div style="font-size:14px;color:#555;margin-bottom:16px;">常用网址</div>
    <div class="links-grid" id="linksGrid"></div>
  </div>
</div>

<script src="main.js"></script>
</body>
</html>
